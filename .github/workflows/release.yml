name: Release

on:
  push:
    branches:
      - main
      - 'stable/**'
  workflow_dispatch:

concurrency:
  group: c8ctl-plugin-nano-release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  test:
    name: Lint & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  publish:
    name: Version & Publish (${{ github.ref_name }})
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch remote refs for semantic-release
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune
          git fetch origin '+refs/notes/*:refs/notes/*' || true

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install deps
        run: npm ci

      - name: Use OIDC for plain npm publish (drop setup-node placeholder token)
        run: |
          set -euo pipefail
          # `actions/setup-node` with `registry-url` writes
          # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` into the job
          # .npmrc and exports a placeholder `NODE_AUTH_TOKEN`. @semantic-release/npm
          # runs its own OIDC exchange for the root package and ignores it, but the
          # platform packages publish via a plain `npm publish` subprocess that would
          # otherwise authenticate with that fake token (E404) instead of OIDC.
          # Remove the token line and clear the env so npm (>=11.5.1) uses the
          # workflow id-token (trusted publishing) for those publishes too.
          npm config delete //registry.npmjs.org/:_authToken || true
          echo "NODE_AUTH_TOKEN=" >> "$GITHUB_ENV"

      - name: Download prebuilt binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p binaries
          # Binaries are uploaded to a rolling "binaries" release on this repo by
          # the upstream cross-compile pipeline. Same-repo download, no external
          # references and no extra secrets.
          gh release download binaries \
            --repo "${{ github.repository }}" \
            --dir binaries \
            --clobber

      - name: Publish (semantic-release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Trusted publishing (OIDC): no npm token is provided, so npm (>=11.5.1)
          # exchanges the workflow's id-token (id-token: write) for a short-lived
          # publish credential. This authenticates BOTH @semantic-release/npm (the
          # root c8ctl-plugin-nano package) and the plain `npm publish` calls for
          # the platform packages. Every package (root + platforms) must have a
          # trusted publisher registered on npmjs.com pointing at this repo's
          # release.yml workflow, otherwise the OIDC exchange returns 404.
          #
          # Provenance requires this repo to be public + OIDC (id-token: write).
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release
