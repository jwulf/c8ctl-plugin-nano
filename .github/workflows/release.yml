name: Release

on:
  push:
    branches:
      - main
      - 'stable/**'
  workflow_dispatch:

concurrency:
  group: c8ctl-plugin-nano-release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  test:
    name: Lint & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  publish:
    name: Version & Publish (${{ github.ref_name }})
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch remote refs for semantic-release
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune
          git fetch origin '+refs/notes/*:refs/notes/*' || true

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install deps
        run: npm ci

      - name: Download prebuilt binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p binaries
          # Binaries are uploaded to a rolling "binaries" release on this repo by
          # the upstream cross-compile pipeline. Same-repo download, no external
          # references and no extra secrets.
          gh release download binaries \
            --repo "${{ github.repository }}" \
            --dir binaries \
            --clobber

      - name: Publish (semantic-release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # OIDC trusted publishing: no NPM_TOKEN needed once every package
          # (root + 5 platform packages) has a trusted publisher configured on
          # npmjs.com. For the initial bootstrap publish, set an NPM_TOKEN secret
          # and it will be used automatically via the registry-url .npmrc above.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Provenance requires this repo to be public + OIDC (id-token: write).
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release
